<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScribeFlow Pro - Breeze Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        breeze: {
                            light: '#eff0f1',
                            dark: '#232629',
                            panel: '#31363b',
                            accent: '#3daee9'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .markdown-preview h1 { font-size: 2rem; font-weight: 700; margin: 1.5rem 0 1rem; border-bottom: 1px solid #ccc; }
        .dark .markdown-preview h1 { border-bottom: 1px solid #474b50; }
        .markdown-preview h2 { font-size: 1.5rem; font-weight: 600; margin: 1.5rem 0 0.75rem; border-bottom: 1px solid #ddd; }
        .dark .markdown-preview h2 { border-bottom: 1px solid #474b50; }
        .markdown-preview p { margin-bottom: 1rem; line-height: 1.7; }
        .markdown-preview blockquote { border-left: 4px solid #3daee9; padding-left: 1rem; color: #6b7280; font-style: italic; margin: 1rem 0; background: rgba(61, 174, 233, 0.1); }
        .markdown-preview code { background: #e0e0e0; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-family: monospace; }
        .dark .markdown-preview code { background: #191c1f; color: #da4453; }
        .markdown-preview ul { list-style: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body class="h-full flex flex-col bg-breeze-light dark:bg-breeze-dark text-gray-900 dark:text-gray-100 transition-colors duration-200">

    <header class="bg-gray-200 dark:bg-gray-800 border-b border-gray-300 dark:border-gray-700 px-4 py-2 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="bg-breeze-accent text-white p-2 rounded"><i data-lucide="edit-3"></i></div>
            <h1 class="font-bold text-lg tracking-tight">ScribeFlow</h1>
        </div>
        <div class="flex items-center gap-4">
            <div id="save-status" class="text-xs text-gray-500 dark:text-gray-400 font-mono">All changes saved</div>
            <button id="theme-toggle" class="p-2 hover:bg-gray-300 dark:hover:bg-gray-700 rounded transition-colors" title="Toggle Theme">
                <i data-lucide="sun" class="dark:hidden"></i>
                <i data-lucide="moon" class="hidden dark:block"></i>
            </button>
        </div>
    </header>

    <div class="bg-gray-100 dark:bg-breeze-panel border-b border-gray-300 dark:border-gray-700 p-2 flex gap-1 flex-wrap">
        <button onclick="insert('**', '**')" class="p-1.5 hover:bg-gray-200 dark:hover:bg-gray-600 rounded" title="Bold"><i data-lucide="bold"></i></button>
        <button onclick="insert('*', '*')" class="p-1.5 hover:bg-gray-200 dark:hover:bg-gray-600 rounded" title="Italic"><i data-lucide="italic"></i></button>
        <button onclick="insert('### ', '')" class="p-1.5 hover:bg-gray-200 dark:hover:bg-gray-600 rounded" title="Heading"><i data-lucide="heading"></i></button>
        <button onclick="insert('> ', '')" class="p-1.5 hover:bg-gray-200 dark:hover:bg-gray-600 rounded" title="Quote"><i data-lucide="quote"></i></button>
        <button onclick="insert('- ', '')" class="p-1.5 hover:bg-gray-200 dark:hover:bg-gray-600 rounded" title="List"><i data-lucide="list"></i></button>
        <button onclick="insert('`', '`')" class="p-1.5 hover:bg-gray-200 dark:hover:bg-gray-600 rounded" title="Code"><i data-lucide="code"></i></button>
    </div>

    <main class="flex-1 flex overflow-hidden">
        <textarea id="editor" class="w-1/2 h-full p-6 outline-none resize-none bg-white dark:bg-[#191c1f] text-gray-800 dark:text-gray-200 font-mono text-sm border-r border-gray-300 dark:border-gray-700"></textarea>
        <div id="preview" class="w-1/2 h-full p-6 overflow-y-auto bg-gray-50 dark:bg-breeze-dark markdown-preview"></div>
    </main>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const saveStatus = document.getElementById('save-status');
        const themeToggle = document.getElementById('theme-toggle');

        function insert(prefix, suffix) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const text = editor.value;
            editor.value = text.substring(0, start) + prefix + text.substring(start, end) + suffix + text.substring(end);
            update();
        }

        function update() {
            preview.innerHTML = DOMPurify.sanitize(marked.parse(editor.value));
            localStorage.setItem('autosave-content', editor.value);
            saveStatus.textContent = 'Last saved at ' + new Date().toLocaleTimeString();
        }

        editor.addEventListener('input', () => {
            saveStatus.textContent = 'Saving...';
            clearTimeout(window.saveTimer);
            window.saveTimer = setTimeout(update, 1000);
        });

        // Theme management
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        });

        window.onload = () => {
            // Load content
            editor.value = localStorage.getItem('autosave-content') || '# Start writing...';
            update();
            
            // Load theme
            if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
            
            lucide.createIcons();
        };
    </script>
</body>
</html>
