<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScribeFlow - Premium Markdown Editor</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Marked Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- DOMPurify to sanitize HTML -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                        serif: ['Merriweather', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        .dark ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }
        .markdown-preview h1 { font-size: 2rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 1rem; border-bottom: 1px solid rgba(156, 163, 175, 0.3); }
        .markdown-preview h2 { font-size: 1.5rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; border-bottom: 1px solid rgba(156, 163, 175, 0.2); }
        .markdown-preview p { margin-bottom: 1rem; line-height: 1.7; }
        .markdown-preview blockquote { padding-left: 1rem; border-left: 4px solid #3b82f6; color: #6b7280; font-style: italic; margin: 1.5rem 0; background: rgba(59, 130, 246, 0.05); }
        .markdown-preview code { font-family: 'Fira Code', monospace; background-color: rgba(156, 163, 175, 0.15); padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-size: 0.875em; }
    </style>
</head>
<body class="h-full font-sans bg-gray-50 text-gray-800 dark:bg-gray-950 dark:text-gray-100 flex flex-col transition-colors duration-200">

    <header class="border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 px-6 py-3 flex items-center justify-between shrink-0">
        <div class="flex items-center space-x-3">
            <div class="bg-indigo-600 text-white p-2 rounded-lg"><i data-lucide="file-text" class="w-5 h-5"></i></div>
            <div>
                <span class="font-bold text-lg bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">ScribeFlow</span>
                <span class="text-xs text-gray-400 block -mt-1 font-medium">Auto-Saving Editor</span>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <span id="save-status" class="text-xs text-gray-400 font-mono">All changes saved</span>
            <button id="theme-toggle" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg"><i data-lucide="sun" id="sun" class="w-5 h-5 hidden"></i><i data-lucide="moon" id="moon" class="w-5 h-5"></i></button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <div id="editor-container" class="w-1/2 h-full flex flex-col border-r border-gray-200 dark:border-gray-800">
            <textarea id="editor-textarea" spellcheck="false" class="flex-1 w-full p-8 resize-none outline-none font-mono text-sm bg-white dark:bg-gray-900 overflow-y-auto"></textarea>
        </div>
        <div id="preview-area" class="w-1/2 h-full overflow-y-auto p-8 markdown-preview dark:text-gray-300 bg-gray-50 dark:bg-gray-950"></div>
    </main>

    <script>
        const editor = document.getElementById('editor-textarea');
        const previewArea = document.getElementById('preview-area');
        const saveStatus = document.getElementById('save-status');

        // Load saved content
        window.onload = () => {
            const saved = localStorage.getItem('autosave-content');
            editor.value = saved || '# Welcome to ScribeFlow\nStart writing to see changes...';
            updatePreview();
            
            // Theme init
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
            lucide.createIcons();
        };

        // Autosave Logic
        let saveTimeout;
        editor.addEventListener('input', () => {
            saveStatus.textContent = 'Saving...';
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                localStorage.setItem('autosave-content', editor.value);
                saveStatus.textContent = `Last saved at ${new Date().toLocaleTimeString()}`;
                updatePreview();
            }, 2000);
        });

        function updatePreview() {
            previewArea.innerHTML = DOMPurify.sanitize(marked.parse(editor.value));
        }

        document.getElementById('theme-toggle').onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            document.getElementById('sun').classList.toggle('hidden');
            document.getElementById('moon').classList.toggle('hidden');
        };
    </script>
</body>
</html>
